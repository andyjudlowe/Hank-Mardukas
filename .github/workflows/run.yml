name: pet-matcher

on:
  schedule:
    # Daily at 13:00 UTC (~9am ET): scrape + match + rebuild dashboard.
    # The email is only sent on the weekly day (Mondays), gated in the run step.
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      force_email:
        description: "Send the digest email on this run regardless of weekday"
        type: boolean
        default: false
      use_vision:
        description: "Use Claude vision for photo confirmation on this run (costs API tokens; default runs free, attribute-only)"
        type: boolean
        default: false

# Allow committing the SQLite state back and deploying Pages.
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pet-matcher
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Decide email gating
        id: gate
        run: |
          # Send weekly on Monday (day-of-week 1), or when manually forced.
          if [ "${{ github.event.inputs.force_email }}" = "true" ] || [ "$(date -u +%u)" = "1" ]; then
            echo "send=--send-email" >> "$GITHUB_OUTPUT"
          else
            echo "send=" >> "$GITHUB_OUTPUT"
          fi

      - name: "Decide vision usage (default: free, attribute-only)"
        id: vision
        run: |
          # Vision (Claude API, costs tokens) only runs if explicitly opted in:
          # either permanently via the repo variable PETMATCH_USE_VISION=true,
          # or for a single manual run via the workflow_dispatch checkbox.
          if [ "${{ vars.PETMATCH_USE_VISION }}" = "true" ] || [ "${{ github.event.inputs.use_vision }}" = "true" ]; then
            echo "no_photo=0" >> "$GITHUB_OUTPUT"
          else
            echo "no_photo=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          REPORT_FROM: ${{ secrets.REPORT_FROM }}
          PETMATCH_DASHBOARD_URL: ${{ vars.PETMATCH_DASHBOARD_URL }}
          PETMATCH_VISION_MODEL: ${{ vars.PETMATCH_VISION_MODEL }}
          PETMATCH_NO_PHOTO: ${{ steps.vision.outputs.no_photo }}
        run: |
          python -m petmatch.main ${{ steps.gate.outputs.send }}

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/petmatch.db
          git diff --cached --quiet || git commit -m "chore: update pet DB [skip ci]"
          git push || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
